name: Update copyright year

on:
  schedule:
    - cron: "5 8 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Update copyright year in _quarto.yml
        run: |
          python <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          
          path = Path("_quarto.yml")
          lines = path.read_text().splitlines()
          year = str(datetime.now(timezone.utc).year)
          target = '  page-footer: "Copyright '
          updated = False

          for i, line in enumerate(lines):
              if line.startswith(target):
                  new_line = f'  page-footer: "Copyright {year}, Peter Amerkhanian"'
                  if line != new_line:
                      lines[i] = new_line
                      updated = True
                  break
          else:
              raise SystemExit("page-footer line not found in _quarto.yml")

          if updated:
              path.write_text("\n".join(lines) + "\n")
              print("Updated _quarto.yml")
          else:
              print("No change needed")
          PY

      - name: Render site
        run: quarto render --no-execute

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _quarto.yml docs

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update copyright year"
          git push
