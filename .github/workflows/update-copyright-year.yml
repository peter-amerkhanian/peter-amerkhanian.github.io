name: Update copyright year

on:
  schedule:
    - cron: "5 8 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Update copyright year in site files
        run: |
          python <<'PY'
          import re
          from pathlib import Path
          from datetime import datetime, timezone
          
          year = str(datetime.now(timezone.utc).year)
          updates = 0

          quarto_path = Path("_quarto.yml")
          lines = quarto_path.read_text().splitlines()
          target = '  page-footer: "Copyright '

          for i, line in enumerate(lines):
              if line.startswith(target):
                  new_line = f'  page-footer: "Copyright {year}, Peter Amerkhanian"'
                  if line != new_line:
                      lines[i] = new_line
                      quarto_path.write_text("\n".join(lines) + "\n")
                      updates += 1
                      print("Updated _quarto.yml")
                  break
          else:
              raise SystemExit("page-footer line not found in _quarto.yml")

          html_pattern = re.compile(r"Copyright \d{4}, Peter Amerkhanian")
          new_footer = f"Copyright {year}, Peter Amerkhanian"

          for html_path in Path("docs").rglob("*.html"):
              text = html_path.read_text(encoding="utf-8")
              updated_text = html_pattern.sub(new_footer, text)
              if updated_text != text:
                  html_path.write_text(updated_text, encoding="utf-8")
                  updates += 1
                  print(f"Updated {html_path}")

          if updates == 0:
              print("No change needed")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _quarto.yml docs

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update copyright year"
          git push
