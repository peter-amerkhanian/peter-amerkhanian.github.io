name: Update copyright year

on:
  schedule:
    - cron: "5 8 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-year:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Update copyright year in _quarto.yml
        run: |
          python <<'PY'
          import re
          from pathlib import Path
          from datetime import datetime, timezone

          path = Path("_quarto.yml")
          text = path.read_text()

          year = str(datetime.now(timezone.utc).year)

          updated = re.sub(
              r'(page-footer:\s*"Copyright )\d{4}(, Peter Amerkhanian")',
              rf'\1{year}\2',
              text
          )

          if updated != text:
              path.write_text(updated)
              print("Updated _quarto.yml")
          else:
              print("No change needed")
          PY

      - name: Render site
        run: quarto render --no-execute

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _quarto.yml docs

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update copyright year"
          git push
